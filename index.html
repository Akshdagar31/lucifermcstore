<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucifer MC</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    overflow-x: hidden;
}

#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

header {
    text-align: center;
    padding: 30px;
}

h1 {
    color: #ffd700;
    text-shadow: 0 0 10px #ffd700;
}

/* STATUS */
.status-box {
    text-align: center;
    background: #111;
    padding: 20px;
    border-radius: 10px;
    width: fit-content;
    margin: auto;
    box-shadow: 0 0 10px #ffd70033;
}

.refresh-btn {
    background: #ffd700;
    color: black;
    margin-top: 10px;
    font-weight: bold;
}

/* CARDS */
.container {
    text-align: center;
    margin-top: 30px;
}

.card {
    position: relative;
    background: #111;
    padding: 20px;
    margin: 15px;
    border-radius: 12px;
    display: inline-block;
    width: 250px;
    overflow: hidden;
    transition: 0.4s;
    box-shadow: 0 0 10px #ffd70033;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 25px #ffd700;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -80%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transform: skewX(-25deg);
}

.card:hover::before {
    animation: shine 0.8s;
}

@keyframes shine {
    100% { left: 130%; }
}

button {
    background: #ffd700;
    border: none;
    padding: 10px;
    color: black;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.copy-btn {
    background: #444;
    color: white;
}

footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
<h1>Lucifer MC</h1>
<p>Donut SMP Experience | Lifesteal | Economy</p>
</header>

<div class="status-box">
<h2>📊 Server Status</h2>
<p id="status">Checking...</p>
<p id="players"></p>

<p>IP: <b>thor.vitalcloud.fun</b> 
<button class="copy-btn" onclick="copyIP()">Copy</button></p>
<p>Port: 25596</p>

<button class="refresh-btn" onclick="getServerStatus()">🔄 Refresh</button>
<br><br>
<button onclick="joinDiscord()">Join Discord</button>
</div>

<div class="container">
<h2>💎 Store</h2>

<div class="card"><h3>VOID</h3><p>Free</p><button onclick="joinDiscord()">Get</button></div>
<div class="card"><h3>VIP</h3><p>₹30</p><button onclick="buy()">Buy</button></div>
<div class="card"><h3>MVP</h3><p>₹50</p><button onclick="buy()">Buy</button></div>
<div class="card"><h3>ELITE</h3><p>₹99</p><button onclick="buy()">Buy</button></div>
<div class="card"><h3>LUCIFER</h3><p>₹149</p><button onclick="buy()">Buy</button></div>
</div>

<footer>
<p>© Lucifer MC</p>
</footer>

<script>
/* 🔥 FIXED SERVER STATUS */
async function getServerStatus() {
    document.getElementById("status").innerText = "Checking...";
    document.getElementById("players").innerText = "";

    try {
        let res = await fetch("https://api.mcstatus.io/v2/status/java/thor.vitalcloud.fun:25596?nocache=" + Date.now());
        let data = await res.json();

        if (data.online) {
            let online = data.players?.online || 0;
            let max = data.players?.max || 0;

            // 🔥 Fix ghost 1 player issue
            if (online === 1 && max === 0) {
                online = 0;
            }

            document.getElementById("status").innerText = "🟢 Online";
            document.getElementById("players").innerText = "Players: " + online + " / " + max;
        } else {
            document.getElementById("status").innerText = "🔴 Offline";
        }
    } catch {
        document.getElementById("status").innerText = "⚠ Error fetching";
    }
}

getServerStatus();

/* BUTTONS */
function copyIP() {
    navigator.clipboard.writeText("thor.vitalcloud.fun");
    alert("IP Copied!");
}

function joinDiscord() {
    window.open("https://discord.gg/ykkpPz5GAa", "_blank");
}

function buy() {
    window.open("https://discord.gg/ykkpPz5GAa", "_blank");
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*1.2,
        vy: (Math.random()-0.5)*1.2,
        size: Math.random()*2
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="#ffd700";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
